<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password Security Awareness</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      input {
        padding: 8px;
        margin: 5px 0;
        width: 100%;
      }
      #strength {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Password Security Awareness</h1>
    <p>Type a password to check its strength.</p>
    <input type="password" id="pwd" placeholder="Enter password" />
    <div id="strength"></div>
    <script>
      const pwd = document.getElementById("pwd");
      const strength = document.getElementById("strength");
      pwd.addEventListener("input", () => {
        const val = pwd.value;
        let score = 0;
        if (val.length >= 8) score += 1;
        if (/[A-Z]/.test(val)) score += 1;
        if (/[a-z]/.test(val)) score += 1;
        if (/[0-9]/.test(val)) score += 1;
        if (/[^A-Za-z0-9]/.test(val)) score += 1;
        const labels = [
          "Very weak",
          "Weak",
          "Moderate",
          "Strong",
          "Very strong",
          "Excellent",
        ];
        strength.textContent = labels[score] || "";
      });
    </script>
  </body>
</html>
