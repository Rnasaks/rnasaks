<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RNASAKS All Downloader - 2026</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Josefin Sans", sans-serif;
        background: linear-gradient(135deg, #1a0033, #000033);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .header {
        background: #ff0044;
        padding: 15px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(255, 0, 68, 0.4);
      }
      .header h1 {
        font-size: 1.6rem;
      }
      .header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid white;
        margin-left: 8px;
      }
      .section {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 25px;
      }
      .section h2 {
        color: #ffcc00;
        margin-bottom: 12px;
        font-size: 1.4rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        border: none;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        margin-bottom: 12px;
      }
      input::placeholder {
        color: #aaa;
      }
      button {
        background: linear-gradient(90deg, #ff0044, #cc0033);
        color: white;
        border: none;
        padding: 14px 24px;
        font-size: 1.1rem;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 0, 68, 0.5);
      }
      #loader {
        display: none;
        text-align: center;
        font-size: 1.2rem;
        margin: 20px 0;
        color: #ffcc00;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>RNASAKS All Downloader</h1>
    </div>

    <!-- YouTube Section -->
    <div class="section">
      <h2><i class="fab fa-youtube"></i> YouTube Downloader</h2>
      <input
        id="ytInput"
        type="text"
        placeholder="Paste YouTube / Shorts URL..."
      />
      <button onclick="downloadYT()">
        <i class="fas fa-download"></i> Download
      </button>
      <div id="ytLoader">Loading formats...</div>
      <div id="ytResult"></div>
    </div>

    <!-- Instagram Section -->
    <div class="section">
      <h2><i class="fab fa-instagram"></i> Instagram Downloader</h2>
      <input
        id="igInput"
        type="text"
        placeholder="Paste Instagram Reels / Post / Story URL..."
      />
      <button onclick="downloadIG()">
        <i class="fas fa-download"></i> Download
      </button>
      <div id="igLoader">Loading...</div>
      <div id="igResult"></div>
    </div>

    <!-- Facebook Section -->
    <div class="section">
      <h2><i class="fab fa-facebook"></i> Facebook Video / Reels Downloader</h2>
      <input
        id="fbInput"
        type="text"
        placeholder="Paste Facebook Video / Reels URL..."
      />
      <button onclick="downloadFB()">
        <i class="fas fa-download"></i> Download
      </button>
      <div id="fbLoader">Loading...</div>
      <div id="fbResult"></div>
    </div>

    <script>
      // Loader helpers
      function showLoader(id) {
        document.getElementById(id).style.display = "block";
      }
      function hideLoader(id) {
        document.getElementById(id).style.display = "none";
      }

      // YouTube - Using Cobalt (working 2026 free backend)
      async function downloadYT() {
        const url = document.getElementById("ytInput").value.trim();
        const resultDiv = document.getElementById("ytResult");
        const loader = "ytLoader";
        resultDiv.innerHTML = "";

        if (!url.includes("youtube.com") && !url.includes("youtu.be")) {
          alert("Valid YouTube URL দাও!");
          return;
        }

        showLoader(loader);

        try {
          const res = await fetch(`https://api.cobalt.tools/api/json`, {
            method: "POST",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              url: url,
              vCodec: "h264",
              vQuality: "max",
              isAudioOnly: false,
            }),
          });

          const data = await res.json();

          if (data.status === "stream" || data.status === "picker") {
            let links = "";
            if (data.status === "picker") {
              data.picker.forEach((item) => {
                links += `<p><a href="${item.url}" target="_blank" style="color:#ffcc00;">${item.quality || "Video"}</a></p>`;
              });
            } else {
              links = `<a href="${data.url}" target="_blank" style="color:#ffcc00; font-size:1.2rem;">Download Video (Max Quality)</a>`;
            }
            resultDiv.innerHTML = `<div style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.3); border-radius:10px;">${links}</div>`;
          } else {
            alert("Error: " + (data.text || "Try again"));
          }
        } catch (err) {
          alert("Network issue or invalid URL");
        }
        hideLoader(loader);
      }

      // Instagram - Using savefrom-style or public endpoint (working alternative)
      async function downloadIG() {
        const url = document.getElementById("igInput").value.trim();
        const resultDiv = document.getElementById("igResult");
        const loader = "igLoader";
        resultDiv.innerHTML = "";

        if (!url.includes("instagram.com")) {
          alert("Valid Instagram URL দাও!");
          return;
        }

        showLoader(loader);

        try {
          // Using a public working proxy/endpoint (2026 tested)
          const res = await fetch(
            `https://www.getindevice.com/api/insta-downloader?url=${encodeURIComponent(url)}`,
          );
          const data = await res.json();

          if (data && data.url) {
            resultDiv.innerHTML = `<div style="margin-top:15px;">
            <a href="${data.url}" target="_blank" style="color:#ffcc00; font-size:1.2rem; display:block;">Download ${data.type || "Media"}</a>
          </div>`;
          } else if (data && data.medias && data.medias.length > 0) {
            let html = '<div style="margin-top:15px;">';
            data.medias.forEach((m, i) => {
              html += `<a href="${m.url}" target="_blank" style="color:#ffcc00; margin-right:15px;">Media ${i + 1} (${m.type})</a><br>`;
            });
            html += "</div>";
            resultDiv.innerHTML = html;
          } else {
            alert("No media found or error");
          }
        } catch (err) {
          alert("Try another service or check URL");
        }
        hideLoader(loader);
      }

      // Facebook - Using public working endpoint
      async function downloadFB() {
        const url = document.getElementById("fbInput").value.trim();
        const resultDiv = document.getElementById("fbResult");
        const loader = "fbLoader";
        resultDiv.innerHTML = "";

        if (!url.includes("facebook.com") && !url.includes("fb.watch")) {
          alert("Valid Facebook URL দাও!");
          return;
        }

        showLoader(loader);

        try {
          const res = await fetch(
            `https://www.getindevice.com/api/fb-downloader?url=${encodeURIComponent(url)}`,
          );
          const data = await res.json();

          if (data && data.hd) {
            resultDiv.innerHTML = `
            <div style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.3); border-radius:10px;">
              <a href="${data.hd}" target="_blank" style="color:#ffcc00; font-size:1.2rem;">HD Download</a><br>
              <a href="${data.sd || data.hd}" target="_blank" style="color:#aaa;">SD Download</a>
            </div>`;
          } else {
            alert("Error fetching links");
          }
        } catch (err) {
          alert("Service down or invalid URL");
        }
        hideLoader(loader);
      }
    </script>

    <footer
      style="
        text-align: center;
        margin-top: 40px;
        color: #aaa;
        font-size: 0.9rem;
      "
    >
      Developed by RnaSaks (@RnaSaks) • Working 2026
    </footer>
  </body>
</html>
