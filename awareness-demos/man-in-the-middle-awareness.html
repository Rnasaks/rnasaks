<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Man-in-the-Middle Awareness</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      input,
      button {
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Man-in-the-Middle Awareness</h1>
    <p>Send a message; the "attacker" will show what they see.</p>
    <input type="text" id="msg" placeholder="Type a message" />
    <button id="send">Send</button>
    <div>Original: <span id="orig"></span></div>
    <div>Intercepted: <span id="intcp"></span></div>
    <script>
      document.getElementById("send").addEventListener("click", () => {
        const m = document.getElementById("msg").value;
        document.getElementById("orig").textContent = m;
        // simple interception: attacker reads and modifies
        document.getElementById("intcp").textContent =
          m + " [modified by MITM]";
      });
    </script>
  </body>
</html>
